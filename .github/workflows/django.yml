name: Django CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      POSTGRES_DB: lastutis
      POSTGRES_USER: lastutis
      POSTGRES_PASSWORD: lastutis
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "testing_secret_key_123_456"
      OWNER_EMAIL: "test@example.com"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: lastutis
          POSTGRES_USER: lastutis
          POSTGRES_PASSWORD: lastutis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Migrations
      env:
        PYTHONPATH: backend
      run: |
        python backend/core/manage.py migrate

    - name: Run Tests
      env:
        PYTHONPATH: backend
      run: |
        python backend/core/manage.py test appointments gallery
